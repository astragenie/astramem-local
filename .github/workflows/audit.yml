name: bun audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Fail on high/critical vulnerabilities
        run: bun audit --severity high
