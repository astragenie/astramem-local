name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # TypeScript IS the lint in this repo.
      # tsc --noEmit catches type errors without emitting output files.
      # A full build (npm run build) is also run in test.yml on each matrix cell;
      # this job catches type regressions quickly on a single fast runner.
      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit
