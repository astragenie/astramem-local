name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }}, Bun ${{ matrix.bun }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bun: ['1.3']
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun ${{ matrix.bun }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      # better-sqlite3 and sqlite-vec are native modules.
      # bun install --frozen-lockfile triggers node-gyp rebuild via better-sqlite3's install script.
      # On Windows, the MSVC build toolchain must be present (GitHub-hosted runners have it).
      # sqlite-vec ships prebuilt binaries for linux-x64, darwin-arm64, darwin-x64, win32-x64.
      # If a prebuilt is missing the load() call in src/storage/db.ts will throw at runtime
      # and tests will fail with a clear error — this is intentional (no silent green).
      # NOTE: tests run via `bun run test` (invokes vitest via the package.json script), NOT
      # `bun test` (which is Bun's native runner and incompatible with vitest + better-sqlite3).
      - name: Install dependencies (native rebuild included)
        run: bun install --frozen-lockfile

      - name: Build (TypeScript)
        run: bun run build

      - name: Run tests
        # Increase per-test timeout to 60 s to accommodate slower Windows filesystem
        # and spawn startup latency on the CI runner.
        # INTEGRATION_LIVE tests are NOT run — only contract + unit + spawn-based tests.
        run: bun run test -- --testTimeout=60000
        shell: bash
