name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      # better-sqlite3 and sqlite-vec are native modules.
      # npm ci triggers node-gyp rebuild via better-sqlite3's install script.
      # On Windows, the MSVC build toolchain must be present (GitHub-hosted runners have it).
      # sqlite-vec ships prebuilt binaries for linux-x64, darwin-arm64, darwin-x64, win32-x64.
      # If a prebuilt is missing the load() call in src/storage/db.ts will throw at runtime
      # and tests will fail with a clear error — this is intentional (no silent green).
      - name: Install dependencies (native rebuild included)
        run: npm ci

      - name: Build (TypeScript)
        run: npm run build

      - name: Run tests
        # Increase per-test timeout to 60 s to accommodate slower Windows filesystem
        # and spawn startup latency on the CI runner.
        # INTEGRATION_LIVE tests are NOT run — only contract + unit + spawn-based tests.
        run: npm test -- --testTimeout=60000
        shell: bash
